name: Bus Notification System

on:
  schedule:
    # --- Morning Commute (KST 05:30) ---
    # UTC 20:30 (Previous day) corresponds to 05:30 KST
    # Runs Sunday to Thursday UTC (which is Mon to Fri KST)
    - cron: '30 20 * * 0-4'

    # --- Evening Commute (KST 16:30) ---
    # UTC 07:30 (Same day) corresponds to 16:30 KST
    # Runs Monday to Friday UTC (which is Mon to Fri KST)
    - cron: '30 7 * * 1-5'
    
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run Mode'
        required: true
        default: 'morning'
        type: choice
        options:
        - morning
        - evening

jobs:
  run-bus-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Notifier Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          # If triggered manually, use the selected mode
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py --mode ${{ github.event.inputs.mode }}
          else
            # If triggered by Cron, decide based on UTC hour range to account for GitHub cron delays
            HOUR=$(date -u +"%H")
            if [ "$HOUR" -ge 18 ] && [ "$HOUR" -le 23 ]; then
              python main.py --mode morning
            elif [ "$HOUR" -ge 05 ] && [ "$HOUR" -le 10 ]; then
              python main.py --mode evening
            else
              echo "Unexpected hour: $HOUR"
            fi
          fi
